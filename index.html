    <meta name="theme-color" content="#1f2937" />

    <title>Pedigree Canvas — Clinical pedigree drawing for geneticists and genetic counsellors</title>
    <meta
      name="description"
      content="Pedigree Canvas is a local-first clinical pedigree drawing tool for geneticists and genetic counsellors. Build standardised family pedigrees with clinical genetics symbols, condition shading, test-result annotations, and export to PDF, PNG, SVG, JSON and .ped."

      property="og:description"
